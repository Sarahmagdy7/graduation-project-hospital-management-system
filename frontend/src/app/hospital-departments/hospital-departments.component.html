<div class="container-fluid py-3">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="m-0 fw-bold text-secondary"><i class="fas fa-building me-2"></i>Hospital Departments</h4>
    <button class="btn btn-purple shadow-sm text-white" data-bs-toggle="modal" data-bs-target="#hospitalDeptModal" (click)="openAddModal()" style="background-color: #a275bd;">
      <i class="fas fa-plus me-2"></i>Add Department
    </button>
  </div>

  <div class="card border-0 shadow-sm rounded-3">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0 text-center">
          <thead class="table-light text-muted small text-uppercase">
            <tr>
              <th class="py-3">Dept Code</th>
              <th class="py-3">Department Name</th>
              <th class="py-3">Head of Department</th>
              <th class="py-3">Status</th>
              <th class="py-3">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let dept of departmentsList">
              <td class="fw-bold text-secondary">{{ dept.code }}</td>
              <td class="fw-semibold">{{ dept.name }}</td>
              <td>{{ dept.head }}</td>
              <td>
                <span class="badge px-2 py-1" 
                      [ngClass]="dept.status === 'Active' ? 'bg-success-subtle text-success' : 'bg-danger-subtle text-danger'">
                  {{ dept.status }}
                </span>
              </td>
              <td>
                <button class="btn btn-sm btn-outline-primary me-1" data-bs-toggle="modal" data-bs-target="#hospitalDeptModal" (click)="openEditModal(dept)">
                  <i class="fas fa-edit"></i> Edit
                </button>
                <button class="btn btn-sm btn-outline-danger" (click)="deleteDepartment(dept.id)">
                  <i class="fas fa-trash-alt"></i> Delete
                </button>
              </td>
            </tr>
            <tr *ngIf="departmentsList.length === 0">
              <td colspan="5" class="text-muted py-4 fw-medium">No departments registered yet.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<div class="modal fade" id="hospitalDeptModal" tabindex="-1" aria-labelledby="hospitalDeptModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-header text-white" style="background-color: #a275bd;">
        <h5 class="modal-title fw-bold" id="hospitalDeptModalLabel">
          <i class="fas fa-building me-2"></i>{{ isEditMode ? 'Edit Department Profile' : 'Create New Department' }}
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close" id="closeModalBtn"></button>
      </div>
      <div class="modal-body p-4">
        <form (ngSubmit)="saveDepartment()">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold text-secondary">Department Code</label>
              <input type="text" class="form-control" [(ngModel)]="newDepartment.code" name="code" required placeholder="e.g. DEP-04">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold text-secondary">Department Name</label>
              <input type="text" class="form-control" [(ngModel)]="newDepartment.name" name="name" required placeholder="e.g. Neurology">
            </div>
            <div class="col-md-12">
              <label class="form-label fw-semibold text-secondary">Head of Department (Doctor)</label>
              <input type="text" class="form-control" [(ngModel)]="newDepartment.head" name="head" required placeholder="Enter doctor full name">
            </div>
            <div class="col-md-12">
              <label class="form-label fw-semibold text-secondary">Status Mode</label>
              <select class="form-select" [(ngModel)]="newDepartment.status" name="status">
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
              </select>
            </div>
          </div>
          <div class="text-end mt-4">
            <button type="button" class="btn btn-light me-2" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn text-white px-4" style="background-color: #a275bd;">
              {{ isEditMode ? 'Update Details' : 'Save Department' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
