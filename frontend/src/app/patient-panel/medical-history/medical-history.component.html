<div class="history-container">
  <h2>My Medical History</h2>
  <div class="table-responsive">
    <table class="history-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Diagnosis</th>
          <th>Doctor</th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody>
        <!-- هذا الجزء سيتكرر ديناميكياً لكل سجل طبي -->
        <tr *ngFor="let record of medicalRecords">
          <td>{{ record.date }}</td>
          <td>{{ record.diagnosis }}</td>
          <td>{{ record.doctor }}</td>
          <td>{{ record.notes }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
